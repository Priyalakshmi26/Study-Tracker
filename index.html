<!DOCTYPE html>
<html>

<head>

<title>Java 170 Days Study Tracker</title>


<style>


*{
box-sizing:border-box;
}


body{

font-family:'Segoe UI',sans-serif;

background:
linear-gradient(135deg,#667eea,#764ba2);

margin:0;

padding:20px;

}



.container{


max-width:1000px;

margin:auto;

background:#ffffff;

border-radius:30px;

padding:30px;


}



h1{

text-align:center;

color:#4a148c;

font-size:35px;

}





.hero{


display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

flex-wrap:wrap;


background:

linear-gradient(135deg,#ff512f,#dd2476);


padding:25px;

border-radius:25px;

color:white;


}





.streak{


font-size:28px;

font-weight:bold;


}




button{


background:white;

color:#dd2476;

border:none;

padding:15px 25px;

border-radius:50px;

font-size:18px;

font-weight:bold;

cursor:pointer;


}





button:hover{


transform:scale(1.05);


}




.progress-card{


margin-top:25px;

background:

linear-gradient(135deg,#43cea2,#185a9d);

color:white;

padding:25px;

border-radius:25px;


}





.progress{

font-size:25px;

font-weight:bold;


}





.progress-bar{


height:18px;

background:#ffffff55;

border-radius:20px;

overflow:hidden;


}



.progress-fill{


height:100%;

background:#fff;

width:0%;


}






.badges{


display:grid;

grid-template-columns:repeat(auto-fit,minmax(160px,1fr));

gap:15px;


}



.badge{


padding:20px;

border-radius:20px;

background:#eee;

text-align:center;

font-weight:bold;

font-size:18px;


}



.active{


background:

linear-gradient(135deg,#ffd700,#ff9800);

color:white;

}





.day{


margin:12px 0;

padding:18px;

border-radius:20px;

background:#f7f7ff;


display:flex;

justify-content:space-between;

align-items:center;


}





.weekend{


background:#fff8e1;


}



input[type=checkbox]{


width:22px;

height:22px;

cursor:pointer;


}



</style>


</head>



<body>



<div class="container">


<h1>

🚀 Java Developer Journey

</h1>


<div class="hero">


<div class="streak">

🔥 <span id="streak">0</span>

<br>

Day Streak


</div>



<button onclick="completeToday()">

✅ Complete Today

</button>


</div>






<div class="progress-card">


<h2>

📈 Overall Progress

</h2>



<div class="progress">

<span id="progress">
0
</span>%


</div>



<br>


<div class="progress-bar">

<div id="fill" class="progress-fill">

</div>

</div>



</div>






<h2>

🏆 Achievements

</h2>



<div class="badges">


<div id="b3" class="badge">

🌱 Starter

<br>

3 Days

</div>



<div id="b7" class="badge">

🔥 Warrior

<br>

7 Days

</div>




<div id="b30" class="badge">

🏆 Fighter

<br>

30 Days

</div>




<div id="b60" class="badge">

💎 Expert

<br>

60 Days

</div>




<div id="b100" class="badge">

👑 Legend

<br>

100 Days

</div>




<div id="b170" class="badge">

🚀 Java Master

<br>

170 Days

</div>



</div>





<h2>

📚 170 Days Roadmap

</h2>



<div id="roadmap"></div>



</div>







<script>




const topics=[

"Java History JVM JDK JRE",
"Variables",
"Data Types",
"Operators",
"If Else",
"Loops",
"Arrays",
"Class and Object",
"Constructors",
"Inheritance",
"Polymorphism",
"Abstraction",
"Interface",
"Encapsulation",
"Collections",
"ArrayList",
"LinkedList",
"HashMap",
"Exception Handling",
"File Handling",
"Lambda",
"Stream API",
"SQL Basics",
"Joins",
"Indexes",
"Spring Boot",
"REST API",
"JPA",
"Hibernate",
"JVM",
"Threads",
"Multithreading",
"System Design",
"Mock Interview",
"Final Revision"

];




let roadmap=[];

let t=0;


for(let i=1;i<=170;i++){


let d=new Date();

d.setDate(d.getDate()+i);



if(d.getDay()==0 || d.getDay()==6){


roadmap.push(
"🔁 Weekend Revision"
);


}

else{


roadmap.push(
topics[t] || "Practice"
);


t++;


}


}




let data=

JSON.parse(localStorage.getItem("study")) || {};





let streak=0;

let last="";



if(localStorage.getItem("realStreak")){


streak=
Number(localStorage.getItem("streak"));

last=
localStorage.getItem("last");


}







function load(){



let html="";



roadmap.forEach((x,i)=>{


html+=`

<div class="day ${x.includes("Weekend")?'weekend':''}">


<span>

<b>
Day ${i+1}
</b>

<br>

${x}

</span>


<input type="checkbox"

${data[i]?"checked":""}

onclick="save(${i})">


</div>


`;



});



document.getElementById("roadmap")
.innerHTML=html;


update();


}








function save(i){


data[i]=!data[i];


localStorage.setItem(

"study",

JSON.stringify(data)

);


update();


}








function completeToday(){



let today=
new Date().toDateString();


let yesterday=
new Date();


yesterday.setDate(
yesterday.getDate()-1
);



if(last!=today){


if(last==yesterday.toDateString())

streak++;


else

streak=1;



last=today;



localStorage.setItem("streak",streak);

localStorage.setItem("last",last);

localStorage.setItem("realStreak","yes");



}



update();



}








function update(){


let done=0;



Object.values(data)
.forEach(x=>{

if(x)

done++;

});



let percent=

Math.round(done/170*100);



document.getElementById("progress")
.innerHTML=percent;



document.getElementById("fill")
.style.width=percent+"%";



document.getElementById("streak")
.innerHTML=streak;



[
["b3",3],
["b7",7],
["b30",30],
["b60",60],
["b100",100],
["b170",170]

]
.forEach(x=>{


if(streak>=x[1])

document
.getElementById(x[0])
.classList.add("active");


});



}




load();



</script>



</body>


</html>
